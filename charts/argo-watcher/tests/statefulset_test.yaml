suite: test statefulset
templates:
  - templates/statefulset.yaml
tests:
  - it: should fail when deprecated healthChecks key is used
    set:
      healthChecks:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "healthChecks has been removed; use livenessProbe, readinessProbe, and startupProbe instead"

  - it: should fail when replicaCount > 1 with in-memory state
    set:
      replicaCount: 2
      postgres:
        enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "replicaCount > 1 is not supported with in-memory state (postgres.enabled: false); enable postgres for multi-replica deployments"

  - it: should allow replicaCount > 1 when postgres is enabled
    set:
      replicaCount: 2
      postgres:
        enabled: true
        host: localhost
        name: argo_watcher
        user: postgres
        secretName: pg-secret
        secretKey: password
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.replicas
          value: 2

  - it: should pass custom image assertion
    set:
      image:
        repository: alpine
        tag: 3.19
        pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: alpine:3.19
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
      - exists:
          path: spec.template
      - isNullOrEmpty:
          path: spec.template.spec.containers[0].resources
      - isNotNullOrEmpty:
          path: spec.template.spec.containers[0]
      - isKind:
          of: StatefulSet
      - isAPIVersion:
          of: apps/v1
      - hasDocuments:
          count: 1
      - matchRegex:
          path: spec.serviceName
          pattern: ".*argo-watcher"

  - it: should pass image pull secrets assertion
    set:
      imagePullSecrets:
        - name: regcred
        - name: regcred2
    asserts:
      - hasDocuments:
          count: 1
      - exists:
          path: spec.template.spec.imagePullSecrets
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: regcred
      - equal:
          path: spec.template.spec.imagePullSecrets[1].name
          value: regcred2

  - it: should pass pod annotations assertion
    set:
      podAnnotations:
        example: example1
    asserts:
      - equal:
          path: spec.template.metadata.annotations
          value:
            example: example1

  - it: should pass node selector assertion
    set:
      nodeSelector:
        nodegroup: default
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            nodegroup: default

  - it: should pass tolerations assertion
    set:
      tolerations:
        - key: "default"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "stage"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations
          value:
            - effect: NoSchedule
              key: default
              operator: Equal
              value: "true"
            - effect: NoSchedule
              key: stage
              operator: Equal
              value: "true"

  - it: should pass affinity assertion
    set:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: app
    asserts:
      - equal:
          path: spec.template.spec.affinity
          value:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: app

  - it: should not have resources set by default
    asserts:
      - isNullOrEmpty:
          path: spec.template.spec.containers[0].resources

  - it: should pass with custom resources
    set:
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi

  - it: should expose DB_PASSWORD from a specific key in a specific secret
    set:
      postgres:
        enabled: true
        secretName: auto-generated-secret
        secretKey: password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                key: password
                name: auto-generated-secret

  - it: should not have envFrom when argo.secretName is empty
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].envFrom

  - it: should have envFrom when argo.secretName is set
    set:
      argo:
        secretName: my-argo-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-argo-secret

  - it: should have volumeClaimTemplates when persistence is enabled
    set:
      persistence:
        enabled: true
        mountPath: /test-data
        size: 5Gi
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0]
          value:
            name: data
            mountPath: /test-data
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 5Gi

  - it: should not have volumeClaimTemplates when persistence is disabled
    set:
      persistence:
        enabled: false
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates

  - it: should set storageClassName in volumeClaimTemplates
    set:
      persistence:
        enabled: true
        storageClassName: fast-ssd
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: fast-ssd

  - it: should render persistence annotations in volumeClaimTemplates
    set:
      persistence:
        enabled: true
        annotations:
          "helm.sh/resource-policy": keep
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.annotations["helm.sh/resource-policy"]
          value: keep

  - it: should use emptyDir memory volume when persistence is disabled
    set:
      persistence:
        enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir:
              medium: Memory
              sizeLimit: 256Mi
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data
      - notExists:
          path: spec.volumeClaimTemplates

  - it: should have emptyDir and ssh volumes when persistence is disabled and updater is enabled
    set:
      persistence:
        enabled: false
      updater:
        sshSecretName: my-ssh-secret
        sshKey: id_rsa
        knownHostsKey: known_hosts
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir:
              medium: Memory
              sizeLimit: 256Mi
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ssh-key
            secret:
              secretName: my-ssh-secret
              items:
                - key: id_rsa
                  path: id_rsa
      - contains:
          path: spec.template.spec.volumes
          content:
            name: known-hosts
            configMap:
              name: argo-watcher-ssh-known-hosts
              items:
                - key: known_hosts
                  path: known_hosts
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ssh-key
            mountPath: /tmp/id_rsa
            subPath: id_rsa
            readOnly: true
      - notExists:
          path: spec.volumeClaimTemplates

  - it: should have ssh volumes and volumeMounts when updater is enabled
    set:
      updater:
        sshSecretName: my-ssh-secret
        sshKey: id_rsa
        knownHostsKey: known_hosts
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ssh-key
            mountPath: /tmp/id_rsa
            subPath: id_rsa
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: known-hosts
            mountPath: /tmp/ssh_known_hosts
            subPath: known_hosts
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ssh-key
            secret:
              secretName: my-ssh-secret
              items:
                - key: id_rsa
                  path: id_rsa
      - contains:
          path: spec.template.spec.volumes
          content:
            name: known-hosts
            configMap:
              name: argo-watcher-ssh-known-hosts
              items:
                - key: known_hosts
                  path: known_hosts

  - it: should render extraEnvs with valueFrom
    set:
      extraEnvs:
        - name: PLAIN_VAR
          value: "plain-value"
        - name: SECRET_VAR
          valueFrom:
            secretKeyRef:
              name: my-secret
              key: secret-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PLAIN_VAR
            value: "plain-value"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_VAR
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: secret-key

  - it: should render separate liveness and readiness probes with different defaults
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 30
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 10
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.timeoutSeconds
          value: 3
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 3

  - it: should not render startup probe by default
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].startupProbe

  - it: should render startup probe when enabled
    set:
      startupProbe:
        enabled: true
        path: /healthz
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 30
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].startupProbe.periodSeconds
          value: 5
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 30

  - it: should use chart name as container name
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: argo-watcher

  - it: should render topologySpreadConstraints when set
    set:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: argo-watcher
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].topologyKey
          value: kubernetes.io/hostname

  - it: should not render topologySpreadConstraints by default
    asserts:
      - isNull:
          path: spec.template.spec.topologySpreadConstraints

  - it: should render terminationGracePeriodSeconds when set
    set:
      terminationGracePeriodSeconds: 60
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 60

  - it: should render terminationGracePeriodSeconds when set to 0
    set:
      terminationGracePeriodSeconds: 0
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 0

  - it: should not render terminationGracePeriodSeconds by default
    asserts:
      - notExists:
          path: spec.template.spec.terminationGracePeriodSeconds

  - it: should have all volumes and volumeMounts when everything is enabled
    set:
      persistence:
        enabled: true
        mountPath: /data
      updater:
        sshSecretName: my-ssh-secret
        sshKey: id_rsa
        knownHostsKey: known_hosts
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ssh-key
            mountPath: /tmp/id_rsa
            subPath: id_rsa
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: ssh-key
            secret:
              secretName: my-ssh-secret
              items:
                - key: id_rsa
                  path: id_rsa
