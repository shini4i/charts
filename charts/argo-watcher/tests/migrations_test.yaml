suite: test migrations
templates:
  - templates/migrations.yaml
tests:
  - it: should be disabled by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should generate a valid migration Job
    set:
      image:
        repository: ghcr.io/shini4i/argo-watcher
        tag: demo
      postgres:
        enabled: true
        host: db-host
        port: 5432
        name: mydb
        user: myuser
        secretName: db-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job
      - equal:
          path: metadata.annotations
          value:
            "helm.sh/hook": pre-install,pre-upgrade
            "helm.sh/hook-delete-policy": before-hook-creation
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/shini4i/argo-watcher:demo
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - /usr/local/bin/argo-watcher
            - --migrate
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_HOST
            value: db-host
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PORT
            value: "5432"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_NAME
            value: mydb
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_USER
            value: myuser
      - equal:
          path: spec.template.spec.containers[0].envFrom
          value:
            - secretRef:
                name: db-secret
      - equal:
          path: spec.backoffLimit
          value: 5
      - equal:
          path: spec.template.spec.restartPolicy
          value: OnFailure

  - it: should expose DB_PASSWORD from a specific key in a specific secret
    set:
      postgres:
        enabled: true
        secretName: auto-generated-secret
        secretKey: password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                key: password
                name: auto-generated-secret

  - it: should not use envFrom when secretKey is provided
    set:
      postgres:
        enabled: true
        secretName: auto-generated-secret
        secretKey: password
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].envFrom

  - it: should apply pod and container security contexts
    set:
      postgres:
        enabled: true
        secretName: db-secret
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
